name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'plugins/**'

jobs:
  review:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: [self-hosted, linux, x64, vps]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          prompt: |
            Read .github/review-instructions.md for your review instructions.

            PR_NUMBER: ${{ github.event.pull_request.number }}
            TITLE: ${{ github.event.pull_request.title }}
            BODY: ${{ github.event.pull_request.body }}
            AUTHOR: ${{ github.event.pull_request.user.login }}
            BASE: ${{ github.event.pull_request.base.ref }}
            HEAD: ${{ github.event.pull_request.head.ref }}
            CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 12
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
