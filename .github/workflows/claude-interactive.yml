name: Claude Interactive

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    # Only trigger on PR comments (not issue comments — those go to triage)
    # For issue_comment: github.event.issue.pull_request exists only on PR comments
    # For pull_request_review_comment: always a PR context
    if: >
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.issue.pull_request ||
        github.event_name == 'pull_request_review_comment'
      )
    runs-on: [self-hosted, linux, x64, vps]
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          prompt: |
            Read .github/interactive-instructions.md for your instructions.

            REPO: ${{ github.repository }}
            COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
            --allowedTools "Read,Glob,Grep,Write,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(composer install:*),Bash(npm ci:*),Bash(./vendor/bin/phpunit *),Bash(npm run build:*),mcp__github_inline_comment__create_inline_comment"
