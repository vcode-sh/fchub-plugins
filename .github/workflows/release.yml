name: Release Plugin

on:
  push:
    tags:
      - 'fchub-p24/v*'
      - 'fchub-fakturownia/v*'
      - 'fchub-memberships/v*'
      - 'fchub-portal-extender/v*'
      - 'fchub-stream/v*'
      - 'wc-fc/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, linux, x64, vps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          PLUGIN_SLUG="${TAG%%/v*}"
          VERSION="${TAG#*/v}"
          echo "slug=$PLUGIN_SLUG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin: $PLUGIN_SLUG, Version: $VERSION"

      - name: Validate version in plugin header
        run: |
          SLUG="${{ steps.tag.outputs.slug }}"
          VERSION="${{ steps.tag.outputs.version }}"
          MAIN_FILE="plugins/${SLUG}/${SLUG}.php"

          if [ ! -f "$MAIN_FILE" ]; then
            echo "::error::Main plugin file not found: $MAIN_FILE"
            exit 1
          fi

          HEADER_VERSION=$(grep -i "^[[:space:]]*\*[[:space:]]*Version:" "$MAIN_FILE" | head -1 | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')

          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch! Tag: $VERSION, Header: $HEADER_VERSION"
            exit 1
          fi

          echo "Version validated: $VERSION"

      - name: Check versions.json consistency
        continue-on-error: true
        run: |
          SLUG="${{ steps.tag.outputs.slug }}"
          VERSION="${{ steps.tag.outputs.version }}"
          DOCS_VERSION=$(node -e "const v=JSON.parse(require('fs').readFileSync('web-docs/lib/versions.json','utf8'));console.log(v.plugins['${SLUG}']?.version??'NOT_FOUND')")
          if [ "$DOCS_VERSION" != "$VERSION" ]; then
            echo "::warning::versions.json has ${SLUG} at v${DOCS_VERSION}, tag is v${VERSION}. Update versions.json after this release."
          fi

      - name: Setup Node.js
        if: steps.tag.outputs.slug == 'fchub-memberships' || steps.tag.outputs.slug == 'fchub-portal-extender' || steps.tag.outputs.slug == 'fchub-stream'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build assets (fchub-memberships)
        if: steps.tag.outputs.slug == 'fchub-memberships'
        working-directory: plugins/fchub-memberships
        run: |
          npm ci
          npm run build

          if [ ! -d "assets/dist" ] || [ -z "$(ls -A assets/dist)" ]; then
            echo "::error::Build failed — assets/dist/ is empty"
            exit 1
          fi

          echo "Build output:"
          ls -la assets/dist/

      - name: Build assets (fchub-portal-extender)
        if: steps.tag.outputs.slug == 'fchub-portal-extender'
        working-directory: plugins/fchub-portal-extender
        run: |
          npm ci
          npm run build

          if [ ! -d "assets/dist" ] || [ -z "$(ls -A assets/dist)" ]; then
            echo "::error::Build failed — assets/dist/ is empty"
            exit 1
          fi

          echo "Build output:"
          ls -la assets/dist/

      - name: Build assets (fchub-stream)
        if: steps.tag.outputs.slug == 'fchub-stream'
        run: |
          cd plugins/fchub-stream/admin-app
          npm ci
          npm run build

          if [ ! -d "../admin/dist" ] || [ -z "$(ls -A ../admin/dist)" ]; then
            echo "::error::admin-app build failed — admin/dist/ is empty"
            exit 1
          fi

          echo "admin-app build output:"
          ls -la ../admin/dist/

          cd ../portal-app
          npm ci
          npm run build

          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::portal-app build failed — portal-app/dist/ is empty"
            exit 1
          fi

          echo "portal-app build output:"
          ls -la dist/

      - name: Build ZIP
        run: |
          SLUG="${{ steps.tag.outputs.slug }}"
          VERSION="${{ steps.tag.outputs.version }}"
          PLUGIN_DIR="plugins/${SLUG}"
          ZIP_NAME="${SLUG}-${VERSION}.zip"

          tmp_dir=$(mktemp -d)

          # Build rsync exclude args from .distignore
          exclude_args=""
          if [ -f "${PLUGIN_DIR}/.distignore" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              exclude_args="$exclude_args --exclude=$line"
            done < "${PLUGIN_DIR}/.distignore"
          fi

          rsync -a $exclude_args "${PLUGIN_DIR}/" "${tmp_dir}/${SLUG}/"

          (cd "$tmp_dir" && zip -qr "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${SLUG}/")

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "zip_path=${GITHUB_WORKSPACE}/${ZIP_NAME}" >> "$GITHUB_ENV"

          echo "Created: $ZIP_NAME"
          ls -lh "${GITHUB_WORKSPACE}/${ZIP_NAME}"

      - name: Generate release notes
        id: notes
        run: |
          SLUG="${{ steps.tag.outputs.slug }}"

          # Get commits since last tag for this plugin
          PREV_TAG=$(git tag -l "${SLUG}/v*" --sort=-v:refname | head -2 | tail -1)

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${GITHUB_REF_NAME}" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" -- "plugins/${SLUG}/")
          else
            NOTES=$(git log --pretty=format:"- %s" -20 -- "plugins/${SLUG}/")
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Release ${SLUG} v${{ steps.tag.outputs.version }}"
          fi

          # Write to file to handle multiline
          echo "$NOTES" > release_notes.txt
          echo "Generated release notes"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SLUG="${{ steps.tag.outputs.slug }}"
          VERSION="${{ steps.tag.outputs.version }}"

          gh release create "${GITHUB_REF_NAME}" \
            "${zip_path}" \
            --title "${SLUG} v${VERSION}" \
            --notes-file release_notes.txt
