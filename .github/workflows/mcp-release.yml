# Release fluentcart-mcp — tag it, validate it, ship it to npm.
#
# Usage:
#   git tag fluentcart-mcp/v0.9.1
#   git push origin fluentcart-mcp/v0.9.1
#
# Requires NPM_TOKEN secret configured in GitHub repo settings.
name: MCP Release

on:
  push:
    tags:
      - 'fluentcart-mcp/v*'

permissions:
  contents: write
  id-token: write

defaults:
  run:
    working-directory: fluentcart-mcp

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fluentcart-mcp/package-lock.json

      - run: npm ci

      - name: Validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#fluentcart-mcp/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch — tag says $TAG_VERSION, package.json says $PKG_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test
        run: |
          node dist/index.js --version
          node dist/index.js --help

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fluentcart-mcp/package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        working-directory: .
        run: |
          PREV_TAG=$(git tag -l "fluentcart-mcp/v*" --sort=-v:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            git log "$PREV_TAG..$GITHUB_REF_NAME" --pretty=format:"- %s" -- fluentcart-mcp/ > /tmp/release_notes.txt
          else
            git log --pretty=format:"- %s" -20 -- fluentcart-mcp/ > /tmp/release_notes.txt
          fi
          if [ ! -s /tmp/release_notes.txt ]; then
            echo "- Release fluentcart-mcp v${{ needs.validate.outputs.version }}" > /tmp/release_notes.txt
          fi

      - name: Create release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "fluentcart-mcp v${{ needs.validate.outputs.version }}" \
            --notes-file /tmp/release_notes.txt
