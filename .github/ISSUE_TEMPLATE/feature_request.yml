name: Feature Request
description: Got an idea? I'm listening. Probably.
labels: ["enhancement"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Which plugin?
      description: Which plugin should this feature live in?
      options:
        - Przelewy24 (fchub-p24)
        - Fakturownia (fchub-fakturownia)
        - Memberships (fchub-memberships)
        - Stream (fchub-stream)
        - Wishlist (fchub-wishlist)
        - Multi-Currency (fchub-multi-currency)
        - Portal Extender (fchub-portal-extender)
        - WC Migrator (wc-fc)
        - FluentCart MCP Server (fluentcart-mcp)
        - New plugin / not sure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      description: Describe the feature. Be as specific as you can.
      placeholder: I want the plugin to...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why do you want it?
      description: What problem does this solve? "It would be cool" is not a problem statement.
      placeholder: This would help because...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Have you tried solving this another way? Workarounds? Other plugins?
    validations:
      required: false
