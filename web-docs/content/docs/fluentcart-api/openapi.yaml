openapi: 3.0.0
info:
  title: FluentCart REST API
  version: 1.3.9
  description: |
    Complete REST API reference for FluentCart — the WordPress e-commerce plugin.

    ## Base URL
    All endpoints are relative to your WordPress installation:
    `https://your-site.com/wp-json/fluent-cart/v2`

    ## Authentication
    The API uses WordPress Application Passwords (HTTP Basic Auth).
    Generate one at: WordPress Admin → Users → Application Passwords.

    ## Pricing
    All monetary amounts are integers in the smallest currency unit (e.g., cents).
    An amount of `4000` in PLN means 40.00 PLN.

    ## Pagination
    List endpoints return paginated responses with `current_page`, `data`, `total`, `per_page`, `last_page`, and navigation URLs.
  contact:
    name: FluentCart
    url: https://fluentcart.com
  license:
    name: Proprietary
servers:
- url: '{baseUrl}/wp-json/fluent-cart/v2'
  description: FluentCart API
  variables:
    baseUrl:
      default: https://your-site.com
      description: Your WordPress site URL
security:
- applicationPassword: []
tags:
- name: Orders
  description: Order management — create, update, refund, and manage order lifecycle
- name: Products
  description: Product catalog — CRUD, variants, pricing, taxonomy, and integrations
- name: Customers
  description: Customer management — profiles, addresses, and purchase history
- name: Subscriptions
  description: Subscription lifecycle — activate, pause, cancel, renew
- name: Coupons
  description: Coupon management — create, apply, validate, and configure discounts
- name: Shipping
  description: Shipping configuration — zones, methods, and classes
- name: Tax
  description: Tax configuration — classes, rates, country rules, and EU VAT
- name: Reports
  description: Analytics and reporting — revenue, orders, customers, retention
- name: Dashboard
  description: Admin dashboard — onboarding and statistics
- name: Settings
  description: Store configuration — general settings, payment methods, modules, storage
- name: Email Notifications
  description: Email template management and notification settings
- name: Roles
  description: Role-based access control and permission management
- name: Integrations
  description: Third-party integration management — addons, feeds, global settings
- name: Files
  description: File and storage management — upload, download, storage drivers
- name: Labels
  description: Label management for organizing resources
- name: Activity
  description: Activity log and audit trail
- name: Checkout
  description: Checkout flow — fields, order placement, shipping, summaries
- name: Customer Portal
  description: Customer-facing self-service endpoints
- name: Order Bumps
  description: Order bump promotions management
- name: Public
  description: Unauthenticated public-facing endpoints
- name: Product Options
  description: Product attribute groups and terms management
- name: Application
  description: Application initialization and configuration
- name: Miscellaneous
  description: Utility endpoints — countries, onboarding, templates, forms
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders
      description: Retrieve a paginated list of orders with optional filtering and searching.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Page number
      - name: per_page
        in: query
        schema:
          type: integer
          default: 10
        description: Number of results per page
      - name: search
        in: query
        schema:
          type: string
        description: Search orders by keyword
      - name: order_by
        in: query
        schema:
          type: string
          default: id
        description: Field to sort by
      - name: order_type
        in: query
        schema:
          type: string
          default: DESC
          enum:
          - ASC
          - DESC
        description: Sort direction
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/OrderSummary'
                      first_page_url:
                        type: string
                      from:
                        type: integer
                        nullable: true
                      last_page:
                        type: integer
                      last_page_url:
                        type: string
                      links:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaginationLink'
                      next_page_url:
                        type: string
                        nullable: true
                      path:
                        type: string
                      per_page:
                        type: integer
                      prev_page_url:
                        type: string
                        nullable: true
                      to:
                        type: integer
                        nullable: true
                      total:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createOrder
      summary: Create order
      description: Create a new order with items and customer information.
      tags:
      - Orders
      security:
      - applicationPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - customer_id
              properties:
                customer_id:
                  type: integer
                  description: Customer ID to associate with the order
                items:
                  type: array
                  description: Order line items
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      variation_id:
                        type: integer
                      quantity:
                        type: integer
                billing_address:
                  type: object
                  description: Billing address
                shipping_address:
                  type: object
                  description: Shipping address
                payment_method:
                  type: string
                  description: Payment method identifier
                note:
                  type: string
                  description: Order note
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /orders/{order_id}:
    get:
      operationId: getOrder
      summary: Get order details
      description: Retrieve detailed information about a specific order including items, transactions, addresses, activities,
        and customer data.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                  discount_meta:
                    type: string
                  shipping_meta:
                    type: string
                  order_settings:
                    type: array
                    items:
                      type: object
                  selected_labels:
                    type: array
                    items:
                      type: object
                  tax_id:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: updateOrder
      summary: Update order
      description: Update an existing order's information. Subscription orders cannot be edited. Completed orders cannot have
        their status updated.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: Order status
                note:
                  type: string
                  description: Order note
                billing_address:
                  type: object
                  description: Billing address to update
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteOrder
      summary: Delete order
      description: Delete an order (soft delete).
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      responses:
        '200':
          description: Order deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/mark-as-paid:
    post:
      operationId: markOrderAsPaid
      summary: Mark order as paid
      description: Mark an order as paid manually.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_method:
                  type: string
                  description: Payment method used
                transaction_id:
                  type: string
                  description: External transaction ID
                note:
                  type: string
                  description: Payment note
      responses:
        '200':
          description: Order marked as paid
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/refund:
    post:
      operationId: refundOrder
      summary: Refund order
      description: Process a refund for an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  description: Refund amount in cents
                reason:
                  type: string
                  description: Reason for the refund
                refund_method:
                  type: string
                  description: Refund method to use
      responses:
        '200':
          description: Refund processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/statuses:
    put:
      operationId: updateOrderStatuses
      summary: Update order statuses
      description: Update order statuses including payment status, shipping status, and order status.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_status:
                  type: string
                  description: Payment status
                shipping_status:
                  type: string
                  description: Shipping status
                order_status:
                  type: string
                  description: Order status
      responses:
        '200':
          description: Statuses updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/sync-statuses:
    put:
      operationId: syncOrderStatuses
      summary: Sync order statuses
      description: Synchronise order statuses with the payment gateway.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      responses:
        '200':
          description: Statuses synced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/change-customer:
    post:
      operationId: changeOrderCustomer
      summary: Change order customer
      description: Change the customer associated with an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - customer_id
              properties:
                customer_id:
                  type: integer
                  description: New customer ID
      responses:
        '200':
          description: Customer changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/create-and-change-customer:
    post:
      operationId: createAndChangeCustomer
      summary: Create and change customer
      description: Create a new customer and associate them with the order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
                  description: New customer email
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        '200':
          description: Customer created and assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/update-address-id:
    post:
      operationId: updateOrderAddressId
      summary: Update order address ID
      description: Update the address ID associated with an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address_id:
                  type: integer
                  description: Address ID
                address_type:
                  type: string
                  description: Address type (billing or shipping)
      responses:
        '200':
          description: Address ID updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/generate-missing-licenses:
    post:
      operationId: generateMissingLicenses
      summary: Generate missing licenses
      description: Generate missing licenses for an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      responses:
        '200':
          description: Licenses generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/create-custom:
    post:
      operationId: createCustomOrder
      summary: Create custom order
      description: Create a custom order line item on an existing order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Custom order item created
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/address/{address_id}:
    put:
      operationId: updateOrderAddress
      summary: Update order address
      description: Update a billing or shipping address on an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: address_id
        in: path
        required: true
        schema:
          type: integer
        description: Address ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address_1:
                  type: string
                address_2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                postcode:
                  type: string
                country:
                  type: string
                  description: ISO 3166-1 alpha-2 country code
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/transactions:
    get:
      operationId: getOrderTransactions
      summary: Get order transactions
      description: Retrieve all transactions for a specific order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/transactions/{transaction_id}:
    get:
      operationId: getTransactionDetails
      summary: Get transaction details
      description: Retrieve details of a specific transaction on an order.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
        description: Transaction ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{order_id}/transactions/{transaction_id}/status:
    put:
      operationId: updateTransactionStatus
      summary: Update transaction status
      description: Update the status of a specific transaction.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
        description: Transaction ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: New transaction status
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/transactions/{transaction_id}/accept-dispute:
    post:
      operationId: acceptDispute
      summary: Accept dispute
      description: Accept a dispute for a transaction.
      tags:
      - Orders
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
        description: Transaction ID
      responses:
        '200':
          description: Dispute accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/subscriptions/{subscription_id}/cancel:
    put:
      operationId: cancelSubscription
      summary: Cancel subscription
      description: Cancel a subscription associated with an order.
      tags:
      - Subscriptions
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: subscription_id
        in: path
        required: true
        schema:
          type: integer
        description: Subscription ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Cancellation reason
                cancel_immediately:
                  type: boolean
                  description: Whether to cancel immediately or at end of billing period
      responses:
        '200':
          description: Subscription cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/subscriptions/{subscription_id}/fetch:
    put:
      operationId: fetchSubscription
      summary: Fetch subscription from gateway
      description: Fetch and synchronise subscription data from the payment gateway.
      tags:
      - Subscriptions
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: subscription_id
        in: path
        required: true
        schema:
          type: integer
        description: Subscription ID
      responses:
        '200':
          description: Subscription data fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/subscriptions/{subscription_id}/pause:
    put:
      operationId: pauseSubscription
      summary: Pause subscription
      description: Pause an active subscription.
      tags:
      - Subscriptions
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: subscription_id
        in: path
        required: true
        schema:
          type: integer
        description: Subscription ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pause_until:
                  type: string
                  format: date-time
                  description: Date to resume the subscription
                reason:
                  type: string
                  description: Reason for pausing
      responses:
        '200':
          description: Subscription paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/subscriptions/{subscription_id}/reactivate:
    put:
      operationId: reactivateSubscription
      summary: Reactivate subscription
      description: Reactivate a cancelled or expired subscription.
      tags:
      - Subscriptions
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: subscription_id
        in: path
        required: true
        schema:
          type: integer
        description: Subscription ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reactivation_date:
                  type: string
                  format: date-time
                  description: Reactivation date
      responses:
        '200':
          description: Subscription reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orders/{order_id}/subscriptions/{subscription_id}/resume:
    put:
      operationId: resumeSubscription
      summary: Resume subscription
      description: Resume a paused subscription.
      tags:
      - Subscriptions
      security:
      - applicationPassword: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID
      - name: subscription_id
        in: path
        required: true
        schema:
          type: integer
        description: Subscription ID
      responses:
        '200':
          description: Subscription resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
