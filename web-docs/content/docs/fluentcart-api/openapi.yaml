components:
  securitySchemes:
    applicationPassword:
      type: http
      scheme: basic
      description: 'WordPress Application Password authentication. Generate one at wp-admin > Users > Application Passwords.
        Use as Basic Auth with username:application_password (base64-encoded).

        '
    cookieAuth:
      type: apiKey
      in: cookie
      name: wordpress_logged_in
      description: 'WordPress cookie authentication for same-origin requests. Requires a valid nonce passed via X-WP-Nonce
        header.

        '
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum:
          - pending
          - processing
          - completed
          - canceled
          - on_hold
        parent_id:
          type: integer
          nullable: true
        receipt_number:
          type: string
        invoice_no:
          type: string
        fulfillment_type:
          type: string
          enum:
          - digital
          - physical
        type:
          type: string
          enum:
          - payment
          - onetime
          - subscription
        mode:
          type: string
          enum:
          - test
          - live
        shipping_status:
          type: string
          enum:
          - pending
          - shipped
          - delivered
          - returned
          - unshipped
        customer_id:
          type: integer
        payment_method:
          type: string
        payment_status:
          type: string
          enum:
          - pending
          - paid
          - partially_refunded
          - refunded
          - failed
        payment_method_title:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code
        subtotal:
          type: integer
          description: Amount in cents
        discount_tax:
          type: integer
          description: Amount in cents
        manual_discount_total:
          type: integer
          description: Amount in cents
        coupon_discount_total:
          type: integer
          description: Amount in cents
        shipping_tax:
          type: integer
          description: Amount in cents
        shipping_total:
          type: integer
          description: Amount in cents
        tax_total:
          type: integer
          description: Amount in cents
        total_amount:
          type: integer
          description: Amount in cents
        total_paid:
          type: string
          description: Amount in cents (string)
        total_refund:
          type: string
          description: Amount in cents (string)
        rate:
          type: string
          description: Exchange rate
        tax_behavior:
          type: string
        note:
          type: string
        ip_address:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        refunded_at:
          type: string
          format: date-time
          nullable: true
        uuid:
          type: string
        config:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        parent_order:
          type: object
          nullable: true
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        customer:
          $ref: '#/components/schemas/Customer'
        children:
          type: array
          items:
            type: object
        order_items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        order_addresses:
          type: array
          items:
            $ref: '#/components/schemas/OrderAddress'
        billing_address:
          $ref: '#/components/schemas/OrderAddress'
        shipping_address:
          $ref: '#/components/schemas/OrderAddress'
        applied_coupons:
          type: array
          items:
            type: object
        custom_checkout_url:
          type: string
          format: uri
        has_missing_licenses:
          type: boolean
        order_operation:
          $ref: '#/components/schemas/OrderOperation'
        receipt_url:
          type: string
          format: uri
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: string
        post_id:
          type: string
        fulfillment_type:
          type: string
          enum:
          - digital
          - physical
        payment_type:
          type: string
          enum:
          - onetime
          - subscription
        post_title:
          type: string
        title:
          type: string
        object_id:
          type: string
          description: Variant ID
        cart_index:
          type: string
        quantity:
          type: string
        unit_price:
          type: integer
          description: Amount in cents
        cost:
          type: integer
          description: Amount in cents
        subtotal:
          type: integer
          description: Amount in cents
        tax_amount:
          type: integer
          description: Amount in cents
        shipping_charge:
          type: integer
          description: Amount in cents
        discount_total:
          type: integer
          description: Amount in cents
        line_total:
          type: integer
          description: Amount in cents
        refund_total:
          type: integer
          description: Amount in cents
        rate:
          type: string
        other_info:
          type: object
        line_meta:
          type: object
        fulfilled_quantity:
          type: string
        referrer:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        payment_info:
          type: string
        setup_info:
          type: string
        is_custom:
          type: boolean
        formatted_total:
          type: string
          description: Human-readable formatted total with currency
        variants:
          $ref: '#/components/schemas/ProductVariation'
    Transaction:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: string
        order_type:
          type: string
        transaction_type:
          type: string
          enum:
          - charge
          - refund
        subscription_id:
          type: integer
          nullable: true
        card_last_4:
          type: string
          nullable: true
        card_brand:
          type: string
          nullable: true
        vendor_charge_id:
          type: string
        payment_method:
          type: string
        payment_mode:
